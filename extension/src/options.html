<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Screener NL — options</title>
<style>
  body { font: 13px/1.5 -apple-system, "Segoe UI", Roboto, sans-serif; color: #111; margin: 0; padding: 20px; max-width: 520px; }
  h1 { font-size: 15px; margin: 0 0 12px; }
  label { display: block; margin-top: 12px; font-weight: 500; }
  input, select { width: 100%; box-sizing: border-box; padding: 8px; border: 1px solid #d0d7de; border-radius: 6px; font: inherit; background: #fff; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .row { display: flex; gap: 8px; align-items: center; margin-top: 12px; flex-wrap: wrap; }
  button { padding: 6px 12px; border: 1px solid #d0d7de; background: #f6f8fa; border-radius: 6px; cursor: pointer; }
  button.primary { background: #2563eb; color: #fff; border-color: #1d4ed8; }
  .hint { color: #6b7280; font-size: 12px; margin-top: 4px; }
  .price { color: #6b7280; font-size: 12px; margin-top: 4px; font-family: ui-monospace, "SF Mono", Menlo, monospace; }
  .ok { color: #166534; }
  .warn { color: #92400e; }
  a { color: #2563eb; }
</style>
</head>
<body>
  <h1>Screener NL — options</h1>
  <p class="hint">
    Rule-based translation runs first and needs no key. When it can't parse your English, the
    panel can fall back to an LLM if you paste a key here.
  </p>

  <div class="grid-2">
    <div>
      <label for="provider">Provider</label>
      <select id="provider">
        <option value="gemini">Google Gemini</option>
        <option value="openai">OpenAI</option>
        <option value="anthropic">Anthropic Claude</option>
        <option value="deepseek">DeepSeek</option>
      </select>
    </div>
    <div>
      <label for="model">Model</label>
      <select id="model"></select>
    </div>
  </div>
  <div class="price" id="pricing-hint"></div>

  <label for="key">API key</label>
  <input id="key" type="password" autocomplete="off">
  <div class="hint">Get a key: <a id="key-get-link" href="#" target="_blank" rel="noopener">provider dashboard →</a></div>

  <div class="row">
    <button id="save" class="primary">Save</button>
    <button id="clear">Clear key</button>
    <span id="status"></span>
  </div>

  <script src="providers.js"></script>
  <script src="settings-io.js"></script>
  <script src="options.js"></script>
</body>
</html>
