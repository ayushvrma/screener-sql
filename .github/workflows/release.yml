name: release
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with: { node-version: "20" }
      - name: Test
        run: node --test extension/test/translator.test.mjs
      - name: Generate icons
        run: node extension/tools/make-icons.mjs
      - name: Build zip
        run: node extension/tools/build.mjs
      - name: Validate packaged zip
        run: node extension/tools/validate-package.mjs extension/dist/screener-nl-*.zip
      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: extension/dist/*.zip
