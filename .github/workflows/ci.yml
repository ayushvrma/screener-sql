name: ci
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test & lint (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: ["20", "22"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Unit tests
        run: node --test extension/test/translator.test.mjs

      - name: Generate icons
        run: node extension/tools/make-icons.mjs

      - name: Build zip
        run: node extension/tools/build.mjs

      - name: Validate packaged zip (MV3, file refs, PNG icons, HTTPS hosts)
        run: node extension/tools/validate-package.mjs extension/dist/screener-nl-*.zip

      - uses: actions/upload-artifact@v4
        if: matrix.node == '22'
        with:
          name: extension-zip
          path: extension/dist/*.zip
          if-no-files-found: error
          retention-days: 14

